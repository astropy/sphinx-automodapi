name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags: '*'
  workflow_dispatch:
  schedule:
    # Weekly cron
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Code style checks
            os: ubuntu-latest
            python-version: 3.x
            toxenv: codestyle

          # Linux - test different Sphinx versions
          - os: ubuntu-latest
            python-version: '3.10'
            toxenv: py310-test-sphinx_oldest
          - os: ubuntu-latest
            python-version: '3.10'
            toxenv: py310-test-sphinx62
          - os: ubuntu-latest
            python-version: '3.10'
            toxenv: py310-test-sphinx70
          - os: ubuntu-latest
            python-version: '3.10'
            toxenv: py310-test-sphinx71
          - os: ubuntu-latest
            python-version: '3.11'
            toxenv: py311-test-sphinx72-cov-clocale
          - os: ubuntu-latest
            python-version: '3.12'
            toxenv: py312-test-sphinx80
          - os: ubuntu-latest
            python-version: '3.12'
            toxenv: py312-test-sphinx81
          - os: ubuntu-latest
            python-version: '3.13'
            toxenv: py313-test-sphinx82
          - os: ubuntu-latest
            python-version: '3.14'
            toxenv: py314-test-sphinx90
          - os: ubuntu-latest
            python-version: '3.14'
            toxenv: py314-test-sphinxdev

          # MacOS X - just the stable and dev
          - os: macos-latest
            python-version: '3.11'
            toxenv: py311-test-sphinx90-clocale
          - os: macos-latest
            python-version: '3.14'
            toxenv: py314-test-sphinxdev

          # Windows - just the oldest, stable, and dev
          - os: windows-latest
            python-version: '3.10'
            toxenv: py310-test-sphinx_oldest
          - os: windows-latest
            python-version: '3.13'
            toxenv: py313-test-sphinx90
          - os: windows-latest
            python-version: '3.14'
            toxenv: py314-test-sphinxdev

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install graphviz on Linux
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install graphviz
    - name: Install graphviz on OSX
      if: startsWith(matrix.os, 'macos')
      run: |
        brew update
        brew install graphviz
    - name: Install graphviz on Windows
      if: startsWith(matrix.os, 'windows')
      run: choco install graphviz
    - name: Install tox
      run: python -m pip install tox
    - name: Run tox
      run: tox ${{ matrix.toxargs }} -v -e ${{ matrix.toxenv }}
    - name: Upload coverage to codecov
      if: ${{ contains(matrix.toxenv,'-cov') }}
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
      with:
        file: ./coverage.xml
